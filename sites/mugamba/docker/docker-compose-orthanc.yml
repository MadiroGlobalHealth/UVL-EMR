services:
  orthanc:
    command: /run/secrets/
    secrets:
      - orthanc.json
    image: orthancteam/orthanc:latest
    labels:
      - "traefik.enable=true"
      - "traefik.http.services.orthanc.loadbalancer.server.port=8042"
      - "traefik.http.routers.orthanc.rule=Host(`${ORTHANC_HOSTNAME}`)"
    restart: always
    environment:
      - ORTHANC__REMOTE_ACCESS_ALLOWED=true
      - ORTHANC__AUTHENTICATION_ENABLED=false
      - STONE_WEB_VIEWER_PLUGIN_ENABLED=true
      - DICOM_WEB_PLUGIN_ENABLED=true
      - POSTGRESQL_PLUGIN_ENABLED=true
    volumes:
      - orthanc-db:/var/lib/orthanc/db
    networks:
      web:
      ozone:
        aliases:
          - orthanc
    ports:
      - "8889:8042"
      - "4242:4242"
    depends_on:
      postgres-orthanc:
        condition: service_healthy

  postgres-orthanc:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_DB: orthanc
      POSTGRES_USER: orthanc
      POSTGRES_PASSWORD: ${ORTHANC_DB_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orthanc"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - orthanc-postgres-db:/var/lib/postgresql/data
    networks:
      ozone:
        aliases:
          - postgres-orthanc

  eip-openmrs-orthanc:
    depends_on:
      openmrs:
        condition: service_healthy
      mysql:
        condition: service_started
      orthanc:
        condition: service_started
    environment:
      - EIP_DB_NAME_ORTHANC=${EIP_DB_NAME_ORTHANC}
      - EIP_DB_USER_ORTHANC=${EIP_DB_USER_ORTHANC}
      - EIP_DB_PASSWORD_ORTHANC=${EIP_DB_PASSWORD_ORTHANC}
      - OPENMRS_URL=http://openmrs:8080/openmrs
      - ORTHANC_URL=http://orthanc:8042
      - EIP_PROFILE=prod
      - MYSQL_ADMIN_USER=root
      - MYSQL_ADMIN_USER_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - OAUTH_ACCESS_TOKEN_URI=http://keycloak:8080/realms/ozone/protocol/openid-connect/token
      - OPENMRS_DB_HOST=${OPENMRS_DB_HOST}
      - OPENMRS_DB_PORT=${OPENMRS_DB_PORT}
      - OPENMRS_DB_NAME=${OPENMRS_DB_NAME}
      - OPENMRS_DB_USER=${OPENMRS_DB_USER}
      - OPENMRS_DB_PASSWORD=${OPENMRS_DB_PASSWORD}
      - OPENMRS_USER=${OPENMRS_USER}
      - OPENMRS_PASSWORD=${OPENMRS_PASSWORD}
      - EIP_FHIR_RESOURCES=Patient
      - EIP_FHIR_SERVER_URL=http://openmrs:8080/openmrs/ws/fhir2/R4
      - EIP_FHIR_USERNAME=${OPENMRS_USER}
      - EIP_FHIR_PASSWORD=${OPENMRS_PASSWORD}
      - ORTHANC_PUBLIC_URL=${SERVER_SCHEME}://${ORTHANC_HOSTNAME}
      - OAUTH_ENABLED=false
      - ORTHANC_OAUTH_ENABLED=true
      - OAUTH_ACCESS_TOKEN_URL=http://keycloak:8080/realms/ozone/protocol/openid-connect/token
      - OAUTH_CLIENT_ID=orthanc-service
      - OAUTH_CLIENT_SECRET=${ORTHANC_CLIENT_SECRET}
      - EIP_ATTACHMENT_CONCEPT=7cac8397-53cd-4f00-a6fe-028e8d743f8e
    image: mekomsolutions/eip-client:2.2.0
    networks:
      ozone:
        aliases:
          - eip-openmrs-orthanc
    restart: unless-stopped
    volumes:
      - "${EIP_OPENMRS_ORTHANC_ROUTES_PATH}:/eip-client/routes"
      - eip-home-orthanc:/eip-home

  mysql:
    environment:
      EIP_DB_NAME_ORTHANC: ${EIP_DB_NAME_ORTHANC}
      EIP_DB_USER_ORTHANC: ${EIP_DB_USER_ORTHANC}
      EIP_DB_PASSWORD_ORTHANC: ${EIP_DB_PASSWORD_ORTHANC}
    volumes:
      - "${SQL_SCRIPTS_PATH}/mysql/eip-openmrs-orthanc:/docker-entrypoint-initdb.d/db/eip-openmrs-orthanc"

secrets:
  orthanc.json:
    file: ${ORTHANC_CONFIG_PATH}/orthanc.json

volumes:
  orthanc-db:
  orthanc-postgres-db:
  eip-home-orthanc: ~