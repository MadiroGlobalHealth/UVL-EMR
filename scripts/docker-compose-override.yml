services:
  openmrs:
    image: openmrs/openmrs-core:2.7.6
    healthcheck:
      test:
        [
          "CMD",
          "curl",
          "-fsS",
          "--connect-timeout",
          "5",
          "--max-time",
          "10",
          "http://localhost:8080/openmrs/health/started",
        ]
      interval: 15s
      timeout: 10s
      retries: 40
      start_period: 600s

  keycloak:
    image: quay.io/keycloak/keycloak:22.0.5
    platform: linux/arm64
    command: start-dev --import-realm
    networks:
      ozone:
      web:
    volumes:
      - ${KEYCLOAK_CONFIG_PATH}/realms:/opt/keycloak/data/import
      - ${KEYCLOAK_CONFIG_PATH}/themes/carbon:/opt/keycloak/themes/carbon
    environment:
      KC_HOSTNAME_ADMIN_URL: ${SERVER_SCHEME}://${KEYCLOAK_HOSTNAME}
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME_STRICT: "false"
      KC_PROXY_HEADERS: forwarded
      KC_DB: postgres
      KC_DB_URL_HOST: postgresql
      KC_DB_URL_PORT: 5432
      KC_DB_URL_DATABASE: ${KEYCLOAK_DB}
      KC_DB_USERNAME: ${KEYCLOAK_DB_USER}
      KC_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD}
      KC_DB_SCHEMA: ${KEYCLOAK_DB_SCHEMA}
      KEYCLOAK_ADMIN: ${KEYCLOAK_USER}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_PASSWORD}

  mysql:
    image: mariadb:10.11.13

  frontend:
    volumes:
      - "${OPENMRS_FRONTEND_BINARY_PATH}:/usr/share/nginx/html"
      - "${OPENMRS_FRONTEND_CONFIG_PATH}:/usr/share/nginx/html/configs"
      - "${ORTHANC_ATTACHMENTS_PATCH_PATH}:/usr/share/nginx/html/openmrs-esm-patient-attachments-app-11.3.0"
