services:
  openmrs:
    image: openmrs/openmrs-core:2.7.6
    healthcheck:
      test:
        [
          "CMD",
          "curl",
          "-fsS",
          "--connect-timeout",
          "5",
          "--max-time",
          "10",
          "http://localhost:8080/openmrs/health/started",
        ]
      interval: 15s
      timeout: 10s
      retries: 40
      start_period: 600s

  keycloak:
    image: quay.io/keycloak/keycloak:22.0.5
    platform: linux/arm64
    command: start-dev --import-realm
    networks:
      ozone:
      web:
    volumes:
      - ${KEYCLOAK_CONFIG_PATH}/realms:/opt/keycloak/data/import
      - ${KEYCLOAK_CONFIG_PATH}/themes/carbon:/opt/keycloak/themes/carbon
    environment:
      KC_HOSTNAME_ADMIN_URL: ${SERVER_SCHEME}://${KEYCLOAK_HOSTNAME}
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME_STRICT: "false"
      KC_PROXY_HEADERS: forwarded
      KC_DB: postgres
      KC_DB_URL_HOST: postgresql
      KC_DB_URL_PORT: 5432
      KC_DB_URL_DATABASE: ${KEYCLOAK_DB}
      KC_DB_USERNAME: ${KEYCLOAK_DB_USER}
      KC_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD}
      KC_DB_SCHEMA: ${KEYCLOAK_DB_SCHEMA}
      KEYCLOAK_ADMIN: ${KEYCLOAK_USER}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_PASSWORD}

  orthanc-auth-service:
    image: orthancteam/orthanc-auth-service:latest
    platform: linux/amd64
    restart: unless-stopped
    networks:
      ozone:
        aliases:
          - orthanc-auth-service
    volumes:
      - ${ORTHANC_CONFIG_PATH}/../permissions.json:/orthanc-auth-service/permissions.json
    environment:
      ENABLE_KEYCLOAK: "true"
      PERMISSIONS_FILE_PATH: "/orthanc-auth-service/permissions.json"
      KEYCLOAK_URI: "http://keycloak:8080/realms/ozone/"
      KEYCLOAK_CLIENT_ID: "orthanc"
      KEYCLOAK_ADMIN_URI: "http://keycloak:8080/admin/realms/ozone/"
      PUBLIC_ORTHANC_ROOT: "http://localhost:8889/"
      PUBLIC_LANDING_ROOT: "http://localhost:8889/ui/app/token-landing.html"
      SECRET_KEY: "${ORTHANC_AUTH_SERVICE_SECRET_KEY}"
      USERS: '{"orthanc":"orthanc"}'

  orthanc:
    environment:
      - ORTHANC__AUTHENTICATION_ENABLED=false
    depends_on:
      postgres-orthanc:
        condition: service_healthy

  postgres-orthanc:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_DB: orthanc
      POSTGRES_USER: orthanc
      POSTGRES_PASSWORD: ${ORTHANC_DB_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orthanc"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - orthanc-postgres-db:/var/lib/postgresql/data
    networks:
      ozone:
        aliases:
          - postgres-orthanc
    
  eip-openmrs-orthanc-init:
      image: eclipse-temurin:17-jre
      entrypoint: ["sh", "-c", "cp /source/eip-openmrs-orthanc-1.0.0-SNAPSHOT.jar /app/ && echo 'JAR copied successfully'"]
      volumes:
        - "${EIP_OPENMRS_ORTHANC_ROUTES_PATH}:/source"
        - eip-openmrs-orthanc-app:/app
      networks:
        ozone:

  eip-openmrs-orthanc:
    image: eclipse-temurin:17-jre
    entrypoint: ["java", "-jar", "/app/eip-openmrs-orthanc-1.0.0-SNAPSHOT.jar"]
    command: []
    volumes:
      - eip-openmrs-orthanc-app:/app
      - eip-home-orthanc:/eip-home
    depends_on:
      eip-openmrs-orthanc-init:
        condition: service_completed_successfully
    environment:
      - ORTHANC_OAUTH_ENABLED=true
      - OAUTH_ACCESS_TOKEN_URL=http://keycloak:8080/realms/ozone/protocol/openid-connect/token
      - OAUTH_CLIENT_ID=orthanc-service
      - OAUTH_CLIENT_SECRET=${ORTHANC_CLIENT_SECRET}

  mysql:
    image: mariadb:10.11.13

  frontend:
    volumes:
      - "${OPENMRS_FRONTEND_BINARY_PATH}:/usr/share/nginx/html"
      - "${OPENMRS_FRONTEND_CONFIG_PATH}:/usr/share/nginx/html/configs"
      - "${ORTHANC_ATTACHMENTS_PATCH_PATH}:/usr/share/nginx/html/openmrs-esm-patient-attachments-app-11.3.0"

volumes:
  orthanc-postgres-db:
  eip-openmrs-orthanc-app:

