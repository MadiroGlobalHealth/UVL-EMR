name: Publish artifact(s) to the Mekom Nexus Repository

on:
  workflow_call:
    inputs:
      java-version:
        description: 'Java version to use for publishing'
        required: false
        type: string
        default: '17'
      java-distribution:
        description: 'Java distribution to use for publishing'
        required: false
        type: string
        default: 'temurin'
      maven-args:
        description: 'Additional arguments to pass to maven'
        required: false
        type: string
        default: '-DskipTests=true'
      free-disk-space:
        description: 'Whether to free disk space before running the build'
        required: false
        type: boolean
        default: false
    secrets:
      NEXUS_USERNAME:
        required: true
      NEXUS_PASSWORD:
        required: true
      DOCKER_HUB_USERNAME:
        required: false
      DOCKER_HUB_PASSWORD:
        required: false
jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Free Disk Space (Ubuntu)
        if: ${{ inputs.free-disk-space }}
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true
      - uses: actions/checkout@v4

      - name: Set up JDK ${{ inputs.java-version }}
        id: setup-java
        uses: actions/setup-java@v4
        with:
          java-version: ${{ inputs.java-version }}
          distribution: ${{ inputs.java-distribution }}
          cache: 'maven'

      - name: Set settings.xml
        uses: s4u/maven-settings-action@v3.0.0
        with:
          servers: |
            [{
              "id": "madiro-global-health-github-uvl-emr",
              "username": "${{ secrets.NEXUS_USERNAME }}",
              "password": "${{ secrets.NEXUS_PASSWORD }}"
            },
            {
              "id": "docker.io",
              "username": "${{ secrets.DOCKER_HUB_USERNAME || 'username'}}",
              "password": "${{ secrets.DOCKER_HUB_PASSWORD || 'password'}}"
            }]

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Additional disk space cleanup
        if: ${{ inputs.free-disk-space }}
        env:
          BUILDX_BUILDER: default
        run: |
          sudo docker image prune -a -f
          sudo docker builder prune -a -f
          sudo docker system prune -a -f
          sudo apt-get clean
          sudo rm -rf /usr/local/graalvm
          df -h

      - name: Pre-install missing frontend peer dependency
        run: npm install --prefix $HOME @react-aria/utils

      - name: Publish maven artifacts
        run: 'mvn --batch-mode --no-transfer-progress clean deploy ${{ inputs.maven-args }}'
